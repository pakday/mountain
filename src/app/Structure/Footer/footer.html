            <div
              class="sqs-code-container"
              data-localized='{"enableSafeModeButton":"Preview in safe mode","enableSafeModeText":"This block contains embedded scripts. Embedded scripts are disabled while you&apos;re logged in and editing your site.","enableSafeModeTitle":"Embedded Scripts","exitSafeModeButton":"Exit safe preview","exitSafeModeText":"Please view the page after logging out for accurate rendering.","exitSafeModeTitle":"Safe Preview","globalSafeMode":"Embedded Code: This block contains embedded code that has been disabled.","scriptDisabled":"Script Disabled"}'
            >
              <button
                onclick="topFunction()"
                id="myBtn"
                title="Go to top"
                style="display: block"
              >
                To Top
              </button>

              <div></div>
              <div style="padding: 30px 30px 20px"></div>

              <script>
                // When the user scrolls down 20px from the top of the document, show the button
                window.onscroll = function () {
                  scrollFunction();
                };

                function scrollFunction() {
                  if (
                    document.body.scrollTop > 20 ||
                    document.documentElement.scrollTop > 20
                  ) {
                    document.getElementById("myBtn").style.display = "block";
                  } else {
                    document.getElementById("myBtn").style.display = "none";
                  }
                }

                // When the user clicks on the button, scroll to the top of the document
                function topFunction() {
                  document.body.scrollTop = 0;
                  document.documentElement.scrollTop = 0;
                }
              </script>
            </div>
          </div>
